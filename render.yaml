services:
  - type: web
    name: croc-fit-api
    runtime: python
    rootDir: croc-fit-api
    plan: free
    buildCommand: pip install uv && echo "machine github.com login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc && chmod 600 ~/.netrc && uv sync --frozen
    startCommand: uv run uvicorn croc_fit_api.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: LLM_PROVIDER
        sync: false
      - key: LITELLM_API_BASE
        sync: false
      - key: LITELLM_API_KEY
        sync: false
      - key: LITELLM_MODEL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        sync: false
      - key: AZURE_FOUNDRY_ENDPOINT
        sync: false
      - key: AZURE_FOUNDRY_API_KEY
        sync: false
      - key: AZURE_FOUNDRY_MODEL
        sync: false
