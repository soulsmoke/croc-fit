# Security Scheduled Scan
#
# Periodic security scanning for ongoing vulnerability monitoring.
# Runs weekly to catch newly disclosed CVEs affecting existing dependencies.
# Generates updated SBOM on main branch.
#
# NIS2 Art. 21(f): Vulnerability handling and disclosure — requires
# continuous monitoring, not just point-in-time scans.
#
# Installed by gregh into .github/workflows/ of the target project.

name: Security Scheduled Scan

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      full-scan:
        description: 'Run full scan including SBOM regeneration'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: read
  issues: write
  security-events: write

jobs:

  # ─── DEPENDENCY AUDIT ──────────────────────────────────────────────
  # Weekly CVE check against latest vulnerability databases.
  # Catches newly disclosed vulnerabilities in existing dependencies.
  dependency-audit:
    name: Weekly Dependency Audit (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 0  # Don't fail — report only
          format: json
          output: trivy-weekly.json

      - name: Check for new findings
        id: findings
        run: |
          count=$(jq '[.Results[]?.Vulnerabilities // [] | .[] | select(.Severity == "CRITICAL" or .Severity == "HIGH")] | length' trivy-weekly.json 2>/dev/null || echo "0")
          echo "count=${count}" >> "$GITHUB_OUTPUT"
          echo "📊 Found ${count} HIGH/CRITICAL vulnerabilities"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-weekly-${{ github.run_number }}
          path: trivy-weekly.json
          retention-days: 90

    outputs:
      findings-count: ${{ steps.findings.outputs.count }}

  # ─── SBOM UPDATE ───────────────────────────────────────────────────
  # Regenerate SBOM weekly to keep dependency inventory current.
  # NIS2 Art. 21(d): Supply chain transparency requires up-to-date SBOM.
  sbom-update:
    name: Weekly SBOM Update
    runs-on: ubuntu-latest
    if: github.event.inputs.full-scan != 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom-weekly-${{ github.run_number }}

      - name: SBOM summary
        run: |
          components=$(jq '.components | length' sbom.cdx.json)
          echo "📦 SBOM contains ${components} components"

  # ─── VEX UPDATE ────────────────────────────────────────────────────
  # Scan updated SBOM for new vulnerabilities.
  vex-update:
    name: Weekly VEX Update
    runs-on: ubuntu-latest
    needs: [sbom-update]
    steps:
      - uses: actions/checkout@v4

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom-weekly-${{ github.run_number }}

      - name: Scan for vulnerabilities
        uses: anchore/scan-action@v6
        with:
          sbom: sbom.cdx.json
          fail-build: false
          severity-cutoff: high
          output-format: cyclonedx-json

      - name: Upload VEX
        uses: actions/upload-artifact@v4
        with:
          name: vex-weekly-${{ github.run_number }}
          path: results.cdx.json
          retention-days: 90

  # ─── ALERT ON NEW VULNERABILITIES ──────────────────────────────────
  # Creates a summary issue if new HIGH/CRITICAL CVEs are found.
  # Prevents duplicate issues by checking for existing open issues.
  alert:
    name: Vulnerability Alert
    runs-on: ubuntu-latest
    needs: [dependency-audit]
    if: needs.dependency-audit.outputs.findings-count > 0
    steps:
      - uses: actions/checkout@v4

      - name: Download Trivy results
        uses: actions/download-artifact@v4
        with:
          name: trivy-weekly-${{ github.run_number }}

      - name: Create or update issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('trivy-weekly.json', 'utf8'));

            // Collect HIGH/CRITICAL findings
            const findings = [];
            for (const result of results.Results || []) {
              for (const vuln of result.Vulnerabilities || []) {
                if (['CRITICAL', 'HIGH'].includes(vuln.Severity)) {
                  findings.push({
                    id: vuln.VulnerabilityID,
                    pkg: vuln.PkgName,
                    version: vuln.InstalledVersion,
                    fixed: vuln.FixedVersion || 'N/A',
                    severity: vuln.Severity,
                    title: vuln.Title || vuln.VulnerabilityID,
                  });
                }
              }
            }

            if (findings.length === 0) return;

            // Check for existing open security scan issue
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security,automated-scan',
              state: 'open',
              per_page: 1,
            });

            const date = new Date().toISOString().split('T')[0];
            const title = `🔒 Weekly Security Scan — ${findings.length} findings (${date})`;

            let body = `## Weekly Security Scan Results\n\n`;
            body += `**Date**: ${date}\n`;
            body += `**Findings**: ${findings.length} HIGH/CRITICAL vulnerabilities\n\n`;
            body += `| CVE | Package | Installed | Fixed | Severity |\n`;
            body += `|-----|---------|-----------|-------|----------|\n`;
            for (const f of findings) {
              body += `| [${f.id}](https://nvd.nist.gov/vuln/detail/${f.id}) | ${f.pkg} | ${f.version} | ${f.fixed} | ${f.severity} |\n`;
            }
            body += `\n### Next Steps\n\n`;
            body += `1. Triage each finding — assess exploitability in our context\n`;
            body += `2. Update dependencies where fixes are available\n`;
            body += `3. Create VEX statements for non-exploitable CVEs\n`;
            body += `4. If significant incident (NIS2): notify CSIRT within 24h\n`;

            if (existing.data.length > 0) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: body,
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security', 'automated-scan'],
              });
            }
